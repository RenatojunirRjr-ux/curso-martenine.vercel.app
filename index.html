reg("m28",{level:7,lvlLabel:"Nível 7 · Oficina das Ferramentas",eyebrow:"Oficina",num:28,
 title:"Oficina do Full: mandar estoque pro fulfillment",
 sub:"O Full é o escudo algorítmico — mas só funciona se o estoque chega lá certo. Aqui está o fluxo completo, tela por tela: planejar, criar o envio, embalar do jeito que o ML aceita, e acompanhar até virar 'chega amanhã'.",
 html:`
 <h2>Passo 1 — Planejar o envio (quanto de cada um)</h2>
 <p>Em <strong>Gestão de estoque Full → Planejamento de envios</strong>, o ML mostra a urgência por produto (nível de estoque e data limite). A regra é a <strong>curva ABC</strong>: o item A não pode faltar; o C quase nunca vai pro Full, pra não pagar armazenagem à toa.</p>

 <p>Escolha <strong>coleta no seu endereço</strong> (o ML manda um motorista) ou <strong>levar a um ponto</strong>. O ML gera um <strong>número de envio</strong>, uma <strong>data de coleta</strong> e um <strong>código de autorização</strong> — guarde os três.</p>
 <div class="fig"><div data-art="full2"></div><div class="figcap">A coleta é a opção mais cômoda; levar pode sair mais barato se você já tem logística. O custo estimado aparece no resumo.</div></div>

reg("m29",{level:8,lvlLabel:"Nível 8 · Na Prática",eyebrow:"Estudo de Caso",num:29,
 title:"Estudo de caso: um kit do zero ao topo",
 sub:"Tudo que você aprendeu, aplicado num produto só, do início ao fim. Acompanhe o 'Kit 6 Fronhas' nascer, precificar, anunciar, escalar e diagnosticar — com os números reais de cada decisão.",
 html:`
 <p>Esse é o capstone: pegue um produto fictício e veja o sistema inteiro rodando. Os números são exemplo, mas a lógica é a que você vai usar.</p>
 <div class="fig"><div data-art="jornada"></div><div class="figcap">Cada decisão empilha sobre a anterior. Ninguém chega ao topo por um truque — chega pela soma.</div></div>
 <h2>1. Garimpo (Módulos 3 e 26)</h2>
 <p>No autocomplete e nos Mais Vendidos, "fronha" tem demanda boa, mas a fronha avulsa de R$ 22 é uma guerra de preço com margem esmagada pelo custo fixo. <strong>Decisão:</strong> montar um <strong>kit de 6</strong> — sai da comparação direta, sobe o ticket e dilui frete e custo fixo. Subcategoria de cama tem espaço; mira-se top 5, não o #1 geral.</p>
 <h2>2. Precificação (Módulo 6)</h2>
 <p>Custo do kit R$ 33, frete R$ 14, custo fixo R$ 0 (acima de R$ 79), comissão 13%, imposto 6%, margem-alvo 22%.</p>
 <p style="font-family:'Space Mono';font-size:14px;background:var(--paper-2);padding:14px 16px;border-radius:10px">Preço = (33 + 14) ÷ (1 − 0,13 − 0,06 − 0,22)<br>Preço = 47 ÷ 0,59 = <strong>R$ 79,66</strong> → arredonda pra <strong>R$ 89,90</strong> (folga + ticket cheio)</p>
 <p>A R$ 89,90 o kit passa dos R$ 79 (zero custo fixo), tem margem confortável e ainda cabe frete grátis pra subir conversão.</p>
 <h2>3. O anúncio campeão (Módulos 7 e 21)</h2>
 <ul>
 <li><strong>Título:</strong> "Kit 6 Fronhas 50x70 Percal 200 Fios Antialérgica Branca" (keyword na frente, 54 caracteres).</li>
 <li><strong>Ficha 100%</strong> + GTIN; <strong>5 fotos</strong> (capa branca + cama montada + escala + etiqueta de composição + "o que vem na caixa"); <strong>vídeo</strong> de 20s. Score de qualidade: <strong>88</strong>.</li>
 </ul>
 <h2>4. Full (Módulo 28)</h2>
 <p>O kit é curva A → vai pro Full. Ganha "chega amanhã", mais conversão e proteção de reputação. Envio planejado, embalado e etiquetado certo, sem recusa.</p>
 <h2>5. Tráfego pago (Módulo 12)</h2>
 <p>Margem de contribuição ~25% → ROAS de equilíbrio = 100÷25 = <strong>4x</strong>. Começa com ROAS objetivo <strong>4x</strong> pra ganhar tração no lançamento; depois aperta pra <strong>7x</strong> pra focar lucro. TACOS monitorado pra não viciar em mídia.</p>
 <h2>6. Reputação e escala (Módulos 9 e 13)</h2>
 <p>Despacho impecável (Full ajuda), atendimento rápido, reclamações resolvidas em 2 dias → termômetro <strong>verde escuro</strong>. Com giro provado, entram variações (cores), um kit de 4 pra outro ticket, e reposição automática pela curva.</p>
 <h2>7. Quando trava: diagnóstico (Módulo 19)</h2>
 <p>No mês 4 as vendas caem. Em vez de chutar: o funil mostra <strong>impressões ok, mas CTR caiu</strong> → um concorrente novo com foto melhor. <strong>Conserto:</strong> capa refeita (Módulo 23) e preço revisado. CTR volta, vendas sobem. Causa, não sintoma.</p>
 <div class="callout key"><div class="kicker">A lição do caso</div><p>Repare: em nenhum momento o segredo foi <em>preço baixo</em>. Foi <strong>kit certo + conta no azul + anúncio completo + Full + Ads calibrado + reputação + diagnóstico</strong>. É o empilhamento dos sinais que vimos no Módulo 20 — agora aplicado, na ordem. Esse é o sistema. Pegue o seu produto e rode os mesmos sete passos.</p></div>

 <tr><td><b>Anúncio Grátis</b></td><td>Sem comissão, baixa exposição, dura 60 dias, poucos por conta — pra testar</td></tr>
 <tr><td><b>Catálogo</b></td><td>Vários vendedores disputam uma mesma página de produto</td></tr>
 <tr><td><b>Buy Box</b></td><td>A oferta vencedora do catálogo, que leva a maior parte das visitas</td></tr>
 <tr><td><b>Ad-score / Score de qualidade</b></td><td>Nota de 0 a 100 do quão completo é seu anúncio. Mire 80+</td></tr>
 </tbody></table>
 <h2>Taxas e dinheiro</h2>
 <table class="tbl"><thead><tr><th>Termo</th><th>O que é</th></tr></thead><tbody>
 <tr><td><b>Comissão</b></td><td>% que o ML cobra por venda, varia por categoria e tipo de anúncio</td></tr>
 <tr><td><b>Custo fixo / tarifa</b></td><td>Valor por unidade cobrado em itens de ticket baixo (abaixo de ~R$ 79)</td></tr>
 <tr><td><b>Margem de contribuição</b></td><td>O que sobra do preço depois de custo, frete, taxas e imposto</td></tr>
 <tr><td><b>Mercado Pago</b></td><td>O sistema de pagamentos do ML; processa e libera o dinheiro das vendas</td></tr>
 </tbody></table>
 <h2>Reputação</h2>
 <table class="tbl"><thead><tr><th>Termo</th><th>O que é</th></tr></thead><tbody>
 <tr><td><b>Termômetro</b></td><td>A barra de cores (vermelho→verde escuro) que mede sua saúde como vendedor</td></tr>
 <tr><td><b>MercadoLíder</b></td><td>Selo dos melhores vendedores (Líder, Gold, Platinum), com mais visibilidade</td></tr>
 <tr><td><b>Taxa de cancelamento</b></td><td>% de vendas que você cancela; acima de ~2,5% derruba a conta</td></tr>
 <tr><td><b>Reclamações</b></td><td>Mediações abertas pelo comprador; a pior métrica define a cor do termômetro</td></tr>
 </tbody></table>
 <h2>Logística</h2>
 <table class="tbl"><thead><tr><th>Termo</th><th>O que é</th></tr></thead><tbody>
 <tr><td><b>Mercado Envios</b></td><td>O sistema de logística do ML que gera etiquetas e rastreio</td></tr>
 <tr><td><b>Full (Fulfillment)</b></td><td>O ML armazena e despacha por você; dá "chega amanhã" e protege a reputação</td></tr>
 <tr><td><b>Flex</b></td><td>Você entrega no mesmo dia na sua região, com sua logística</td></tr>
 <tr><td><b>Coleta</b></td><td>O ML manda um motorista retirar seu estoque pra mandar ao Full</td></tr>
 <tr><td><b>Volume</b></td><td>A caixa/saco que agrupa produtos pro envio ao Full</td></tr>
 </tbody></table>
 <h2>SEO do anúncio</h2>
 <table class="tbl"><thead><tr><th>Termo</th><th>O que é</th></tr></thead><tbody>
 <tr><td><b>Palavra-chave</b></td><td>O termo que o comprador digita; deve vir na frente do título</td></tr>
 <tr><td><b>GTIN / EAN</b></td><td>O código de barras do produto; preenchê-lo turbina a identificação</td></tr>
 <tr><td><b>Ficha técnica</b></td><td>Os atributos do produto (marca, modelo, cor...); cada um é um filtro de busca</td></tr>
 <tr><td><b>Atributo</b></td><td>Cada característica preenchível da ficha</td></tr>
 </tbody></table>
 <h2>Tráfego pago (Mercado Ads)</h2>
 <table class="tbl"><thead><tr><th>Termo</th><th>O que é</th></tr></thead><tbody>
 <tr><td><b>ROAS</b></td><td>Retorno sobre o gasto com anúncio (faturamento ÷ investido). Quanto maior, melhor</td></tr>
 <tr><td><b>ACOS</b></td><td>O inverso: gasto ÷ faturamento, em %. ACOS = 100 ÷ ROAS</td></tr>
 <tr><td><b>TACOS</b></td><td>Gasto com Ads ÷ faturamento <em>total</em> (não só o de Ads); mede dependência de mídia</td></tr>
 <tr><td><b>CPC</b></td><td>Custo por clique</td></tr>
 <tr><td><b>Leilão de segundo preço</b></td><td>Você paga só o mínimo pra superar o concorrente, não o seu lance máximo</td></tr>
 </tbody></table>
 <h2>Gestão e dados</h2>
 <table class="tbl"><thead><tr><th>Termo</th><th>O que é</th></tr></thead><tbody>
 <tr><td><b>SKU</b></td><td>O código único de cada produto seu</td></tr>

 <tr><td><b>Conciliação</b></td><td>Bater o que o ML depositou contra o que deveria, pra achar a margem real</td></tr>
 <tr><td><b>NF-e</b></td><td>Nota fiscal eletrônica, emitida a cada venda</td></tr>
 <tr><td><b>LTV / AOV</b></td><td>Valor que um cliente gera ao longo do tempo / ticket médio por pedido</td></tr>
 <tr><td><b>Recompra</b></td><td>% de clientes que voltam a comprar de você</td></tr>
 </tbody></table>
 <div class="callout key"><div class="kicker">Dica de uso</div><p>Esse glossário é seu dicionário de bolso. Quando um módulo citar uma sigla que escapou, é só voltar aqui. E se um termo aparecer no ML que não está nesta lista, anote — o vocabulário do marketplace evolui, e dominar a língua é parte de dominar o jogo.</p></div>
 `});

/* ===== GATE — controle de acesso ===== */
/* CONFIG: cole aqui o link do seu checkout (Kiwify) entre as aspas. Deixe vazio pra esconder o botão. */
(function(){
  var CHECKOUT="https://pay.kiwify.com.br/oVERYD7";
  var HASHES=[3500029379540084,2656186835572723,8494826462235660,6471783723199729,6810402626958707,8638489697991051,4593261079814850,1845735863183150,4819533239522743,265304363898603,8779882775120816,5908191726386933,3316109318271395,5733529693524208,2136998833310753,7971413705846272,8306177750336371,8697038982401371,2713850611099449,6706747366163877,5713465169942651,2865884892835503,1730362345577147,5481313594750440,1986717234906874];
  var KEY="mlos_access_v1";
  function cyrb53(str,seed){seed=seed||7;var h1=0xdeadbeef^seed,h2=0x41c6ce57^seed;for(var i=0,ch;i<str.length;i++){ch=str.charCodeAt(i);h1=Math.imul(h1^ch,2654435761);h2=Math.imul(h2^ch,1597334677);}h1=Math.imul(h1^(h1>>>16),2246822507);h1^=Math.imul(h2^(h2>>>13),3266489909);h2=Math.imul(h2^(h2>>>16),2246822507);h2^=Math.imul(h1^(h1>>>13),3266489909);return 4294967296*(2097151&h2)+(h1>>>0);}
  var gate=document.getElementById("gate");
  var input=document.getElementById("gate-input");
  var btn=document.getElementById("gate-btn");
  var err=document.getElementById("gate-err");
  var buy=document.getElementById("gate-buy");
  function unlock(){gate.classList.add("hidden");document.body.style.overflow="";}
  function hashOf(c){return cyrb53(String(c||"").trim().toUpperCase());}
  function valid(c){return HASHES.indexOf(hashOf(c))>-1;}
  if(CHECKOUT){buy.href=CHECKOUT;}else if(buy){buy.style.display="none";}
  // ---- LINK MAGICO: destrava pelo codigo na URL (?cod=MLOS-XXXX-XXXX) ----
  function codeFromUrl(){try{var q=new URLSearchParams(location.search);var c=q.get("cod")||q.get("acesso")||q.get("c");if(!c&&location.hash.length>1){c=decodeURIComponent(location.hash.slice(1));}return c;}catch(e){return null;}}
  var urlCode=codeFromUrl();
  // ---- AUTO-ACESSO: link magico OU retorno salvo (localStorage) ----
  try{
    var saved=localStorage.getItem(KEY);
    if(urlCode&&valid(urlCode)){localStorage.setItem(KEY,String(hashOf(urlCode)));unlock();try{history.replaceState(null,"",location.pathname);}catch(e){}}
    else if(saved&&HASHES.indexOf(parseInt(saved,10))>-1){unlock();}
    else if(urlCode&&input){input.value=urlCode;}
  }catch(e){}
  function attempt(){var c=input.value;if(valid(c)){try{localStorage.setItem(KEY,String(hashOf(c)));}catch(e){}err.textContent="";unlock();}else{err.textContent="Código inválido. Confira o que você recebeu na compra.";input.focus();input.select();}}
  if(btn)btn.addEventListener("click",attempt);
  if(input)input.addEventListener("keydown",function(e){if(e.key==="Enter")attempt();});
  if(gate&&!gate.classList.contains("hidden")){document.body.style.overflow="hidden";if(input)setTimeout(function(){input.focus();},50);}
})();
</script>
