<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Martenine Cursos — Mercado Livre e seus algoritmos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600;6..72,700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#14181d; --ink-2:#1b2026; --ink-3:#242b33;
  --paper:#fbfaf6; --paper-2:#f3efe6; --card:#ffffff;
  --text:#1a1c20; --soft:#5d636b; --faint:#8a9098;
  --line:#e6e0d3; --line-2:#d8d1c2;
  --accent:#ffe000; --accent-deep:#f5c400; --on-accent:#1a1c20;
  --green:#1b7a48; --green-soft:#e7f3ec; --red:#c8392f; --blue:#2b6cb0;
  --t1:#d33b3b; --t2:#e8730e; --t3:#f2b705; --t4:#7cb518; --t5:#1b7a48;
  --r:14px; --r-sm:9px;
  --shadow:0 1px 2px rgba(20,24,29,.05), 0 8px 26px -14px rgba(20,24,29,.22);
  --maxw:760px;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0; background:var(--paper); color:var(--text);
  font-family:"Newsreader",Georgia,serif; font-size:18px; line-height:1.62;
  -webkit-font-smoothing:antialiased;
}
::selection{background:var(--accent);color:var(--on-accent)}
a{color:inherit}

/* ---------- LAYOUT ---------- */
.app{display:grid;grid-template-columns:312px 1fr;min-height:100vh}
.spine{
  position:sticky;top:0;height:100vh;overflow:hidden;
  background:var(--ink);color:#e8ebef;display:flex;flex-direction:column;
  border-right:1px solid #000;
}
.spine-head{padding:22px 22px 14px;border-bottom:1px solid rgba(255,255,255,.08)}
.brand{display:flex;align-items:center;gap:11px;font-family:"Archivo";font-weight:800;letter-spacing:-.02em}
.brand .dot{width:30px;height:30px;border-radius:8px;background:var(--accent);display:grid;place-items:center;color:var(--on-accent);font-size:17px;flex:none}
.brand b{font-size:18px;line-height:1.05}
.brand small{display:block;font-family:"Space Mono";font-weight:400;font-size:10px;letter-spacing:.14em;color:var(--faint);text-transform:uppercase;margin-top:2px}

.therm-wrap{display:flex;gap:14px;padding:16px 22px 6px;align-items:stretch}
.therm{width:10px;border-radius:6px;background:rgba(255,255,255,.09);position:relative;overflow:hidden;flex:none}
.therm-fill{position:absolute;left:0;right:0;bottom:0;height:0%;
  background:linear-gradient(to top,var(--t1),var(--t2) 32%,var(--t3) 55%,var(--t4) 78%,var(--t5));
  transition:height .6s cubic-bezier(.2,.8,.2,1)}
.therm-meta{flex:1;min-width:0}
.therm-meta .pct{font-family:"Archivo";font-weight:800;font-size:30px;line-height:1;letter-spacing:-.03em}
.therm-meta .lbl{font-family:"Space Mono";font-size:10.5px;letter-spacing:.08em;color:var(--faint);text-transform:uppercase;margin-top:5px}
.therm-meta .rank{margin-top:9px;font-family:"Archivo";font-weight:700;font-size:12.5px;display:inline-flex;align-items:center;gap:7px;padding:4px 9px;border-radius:20px;background:rgba(255,255,255,.07)}
.therm-meta .rank i{width:9px;height:9px;border-radius:50%;background:var(--t1);font-style:normal;transition:background .5s}

.nav{flex:1;overflow-y:auto;padding:10px 12px 26px}
.nav::-webkit-scrollbar{width:8px}
.nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:6px}
.nav-group{margin:16px 8px 6px;font-family:"Space Mono";font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);display:flex;align-items:center;gap:8px}
.nav-group .ln{flex:1;height:1px;background:rgba(255,255,255,.1)}
.nav-item{display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:none;border:0;color:#c4cad1;
  font-family:"Archivo";font-weight:600;font-size:13.5px;padding:9px 11px;border-radius:9px;cursor:pointer;line-height:1.25;transition:.15s}
.nav-item:hover{background:rgba(255,255,255,.06);color:#fff}
.nav-item.active{background:var(--accent);color:var(--on-accent)}
.nav-item.active .num{background:rgba(0,0,0,.16);color:var(--on-accent)}
.nav-item .num{flex:none;width:24px;height:24px;border-radius:7px;background:rgba(255,255,255,.08);display:grid;place-items:center;
  font-family:"Space Mono";font-size:11px;font-weight:700}
.nav-item .num.done{background:var(--green);color:#fff}
.nav-item.active .num.done{background:#0e5e36;color:#fff}
.nav-item .tx{flex:1;min-width:0}
.nav-item.tool .num{background:transparent;font-size:14px}
.nav-item.tool.active .num{background:transparent}

/* ---------- MAIN ---------- */
.main{min-width:0;position:relative}
.topbar{position:sticky;top:0;z-index:20;background:rgba(251,250,246,.86);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;padding:11px 26px}
.topbar .crumb{font-family:"Space Mono";font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--soft)}
.topbar .crumb b{color:var(--text)}
.topbar .spacer{flex:1}
.topbar .mini-prog{font-family:"Space Mono";font-size:11.5px;color:var(--soft)}
.menu-btn{display:none;background:var(--ink);color:#fff;border:0;width:40px;height:38px;border-radius:9px;font-size:18px;cursor:pointer}

.reader{max-width:var(--maxw);margin:0 auto;padding:30px 26px 120px}
.eyebrow{font-family:"Space Mono";font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent-deep);font-weight:700;margin:0 0 14px}
.eyebrow b{color:var(--soft);font-weight:400}
h1.mod{font-family:"Archivo";font-weight:900;font-size:clamp(30px,5.4vw,46px);line-height:1.02;letter-spacing:-.035em;margin:0 0 12px}
.lede{font-size:21px;line-height:1.5;color:#34383d;margin:0 0 26px;font-weight:400}
.reader h2{font-family:"Archivo";font-weight:800;font-size:25px;letter-spacing:-.02em;margin:42px 0 12px;line-height:1.12;scroll-margin-top:80px}
.reader h3{font-family:"Archivo";font-weight:700;font-size:18.5px;letter-spacing:-.01em;margin:28px 0 8px}
.reader p{margin:0 0 16px}
.reader strong{font-weight:600}
.reader em{color:#34383d}
.reader ul,.reader ol{margin:0 0 18px;padding-left:22px}
.reader li{margin:0 0 9px}
.reader li::marker{color:var(--accent-deep)}
hr.soft{border:0;border-top:1px solid var(--line);margin:34px 0}

/* devices */
.kicker{font-family:"Archivo";font-weight:700;font-size:12px;letter-spacing:.04em;text-transform:uppercase;color:var(--soft);margin:0 0 6px}
.callout{background:var(--paper-2);border:1px solid var(--line-2);border-radius:var(--r);padding:18px 20px;margin:22px 0;font-size:16.5px;line-height:1.55}
.callout.tip{background:#fffae0;border-color:#f0e08a}
.callout.warn{background:#fdeeea;border-color:#f0c2b7}
.callout.key{background:var(--ink);color:#eef1f4;border-color:#000}
.callout.key .kicker{color:var(--accent)}
.callout .kicker{margin-bottom:8px}
.callout p:last-child{margin-bottom:0}
.callout.key strong{color:#fff}

.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin:22px 0}
.stat{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:15px 16px}
.stat .v{font-family:"Archivo";font-weight:800;font-size:26px;letter-spacing:-.02em;line-height:1}
.stat .v small{font-size:14px;color:var(--soft);font-weight:600}
.stat .k{font-family:"Space Mono";font-size:10.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--soft);margin-top:7px;line-height:1.3}

table.tbl{width:100%;border-collapse:collapse;margin:20px 0;font-size:15px;font-family:"Archivo"}
table.tbl th{background:var(--ink);color:#fff;font-weight:700;text-align:left;padding:10px 13px;font-size:12.5px;letter-spacing:.02em}
table.tbl th:first-child{border-radius:9px 0 0 0}
table.tbl th:last-child{border-radius:0 9px 0 0}
table.tbl td{padding:10px 13px;border-bottom:1px solid var(--line);vertical-align:top}
table.tbl tr:nth-child(even) td{background:#faf7f0}
table.tbl tr:last-child td{border-bottom:0}
.tag{display:inline-block;font-family:"Space Mono";font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;background:var(--paper-2);border:1px solid var(--line-2)}
.tag.g{background:var(--green-soft);border-color:#b8ddc6;color:var(--green)}
.tag.y{background:#fff4c2;border-color:#ecd770;color:#8a6d00}
.tag.r{background:#fdeae7;border-color:#f0c2b7;color:var(--red)}

/* checklist */
.checklist{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:8px 8px;margin:22px 0;box-shadow:var(--shadow)}
.checklist .cl-head{display:flex;align-items:center;gap:10px;padding:10px 12px 6px}
.checklist .cl-head .ic{width:26px;height:26px;border-radius:7px;background:var(--accent);display:grid;place-items:center;flex:none}
.checklist .cl-head b{font-family:"Archivo";font-weight:800;font-size:15px;letter-spacing:-.01em}
.checklist .cl-head .cnt{margin-left:auto;font-family:"Space Mono";font-size:11.5px;color:var(--soft)}
.check{display:flex;gap:12px;align-items:flex-start;padding:10px 12px;border-radius:9px;cursor:pointer;font-family:"Archivo";font-size:14.5px;line-height:1.4;transition:.12s}
.check:hover{background:#faf7f0}
.check .box{flex:none;width:21px;height:21px;border-radius:6px;border:2px solid var(--line-2);margin-top:1px;display:grid;place-items:center;transition:.15s;background:#fff}
.check .box svg{width:13px;height:13px;opacity:0;transform:scale(.5);transition:.15s}
.check.done .box{background:var(--green);border-color:var(--green)}
.check.done .box svg{opacity:1;transform:scale(1)}
.check.done .tx{color:var(--faint);text-decoration:line-through;text-decoration-color:var(--line-2)}
.check .tx{flex:1}

/* quiz */
.quiz{background:var(--ink);color:#eef1f4;border-radius:var(--r);padding:20px 20px 16px;margin:26px 0}
.quiz .qk{font-family:"Space Mono";font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:9px}
.quiz .q{font-family:"Archivo";font-weight:700;font-size:17px;line-height:1.32;margin:0 0 14px;color:#fff}
.quiz .opt{display:block;width:100%;text-align:left;background:var(--ink-3);border:1px solid rgba(255,255,255,.1);color:#dfe3e8;
  font-family:"Archivo";font-weight:600;font-size:14.5px;padding:12px 14px;border-radius:9px;margin-bottom:9px;cursor:pointer;transition:.14s}
.quiz .opt:hover:not(:disabled){background:#2d353e;border-color:rgba(255,255,255,.22)}
.quiz .opt.right{background:var(--green);border-color:var(--green);color:#fff}
.quiz .opt.wrong{background:#5a2420;border-color:var(--red);color:#ffd9d4}
.quiz .opt:disabled{cursor:default}
.quiz .fb{font-family:"Newsreader";font-size:15px;line-height:1.5;color:#cfd4da;margin-top:6px;display:none;padding:11px 13px;background:rgba(255,255,255,.05);border-radius:9px;border-left:3px solid var(--accent)}
.quiz .fb.show{display:block}

/* calculator */
.calc{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:0;margin:26px 0;overflow:hidden;box-shadow:var(--shadow)}
.calc-head{background:linear-gradient(120deg,var(--ink),var(--ink-2));color:#fff;padding:16px 20px}
.calc-head b{font-family:"Archivo";font-weight:800;font-size:16px;letter-spacing:-.01em;display:block}
.calc-head span{font-family:"Space Mono";font-size:11px;color:var(--faint);letter-spacing:.04em}
.calc-body{padding:18px 20px}
.field{margin-bottom:13px}
.field label{display:block;font-family:"Archivo";font-weight:600;font-size:12.5px;color:var(--soft);margin-bottom:5px}
.field label .hint{color:var(--faint);font-weight:400}
.inp{display:flex;align-items:center;background:#fff;border:1.5px solid var(--line-2);border-radius:9px;overflow:hidden;transition:.15s}
.inp:focus-within{border-color:var(--ink)}
.inp .pre{font-family:"Space Mono";font-size:13px;color:var(--soft);padding:0 0 0 12px}
.inp input,.inp select{flex:1;border:0;outline:0;background:none;font-family:"Space Mono";font-size:15px;font-weight:700;color:var(--text);padding:11px 12px;width:100%}
.inp .suf{font-family:"Space Mono";font-size:13px;color:var(--soft);padding-right:12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.calc-out{margin-top:6px;border-top:1px dashed var(--line-2);padding-top:16px}
.out-big{display:flex;align-items:baseline;justify-content:space-between;gap:12px;background:var(--accent);border-radius:11px;padding:14px 18px;margin-bottom:12px}
.out-big .l{font-family:"Archivo";font-weight:700;font-size:13.5px;color:var(--on-accent)}
.out-big .v{font-family:"Archivo";font-weight:900;font-size:30px;letter-spacing:-.02em;color:var(--on-accent)}
.out-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.out-cell{background:var(--paper-2);border-radius:9px;padding:11px 13px}
.out-cell .l{font-family:"Space Mono";font-size:10px;letter-spacing:.04em;text-transform:uppercase;color:var(--soft)}
.out-cell .v{font-family:"Archivo";font-weight:800;font-size:19px;margin-top:3px;letter-spacing:-.01em}
.out-cell.bad .v{color:var(--red)} .out-cell.good .v{color:var(--green)}
.cmp{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:4px}
.cmp .col{border:1.5px solid var(--line-2);border-radius:11px;padding:13px 14px}
.cmp .col h4{font-family:"Archivo";font-weight:800;font-size:14px;margin:0 0 9px;display:flex;align-items:center;gap:7px}
.cmp .col h4 .pill{font-family:"Space Mono";font-size:10px;padding:2px 7px;border-radius:20px;background:var(--paper-2)}
.cmp .col.win{border-color:var(--green);background:var(--green-soft)}
.cmp .col .ln{display:flex;justify-content:space-between;font-family:"Archivo";font-size:13px;margin-bottom:5px}
.cmp .col .ln span:last-child{font-family:"Space Mono";font-weight:700}
.cmp .col .net{margin-top:7px;padding-top:7px;border-top:1px solid var(--line-2);font-weight:800}

/* nav buttons */
.modnav{display:flex;gap:12px;margin-top:54px;border-top:1px solid var(--line);padding-top:22px}
.modnav button{flex:1;text-align:left;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:13px 16px;cursor:pointer;transition:.15s;font-family:"Archivo"}
.modnav button:hover:not(:disabled){border-color:var(--ink);transform:translateY(-1px)}
.modnav button:disabled{opacity:.35;cursor:default}
.modnav button.next{background:var(--ink);color:#fff;border-color:#000}
.modnav button .d{font-family:"Space Mono";font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--soft)}
.modnav button.next .d{color:var(--faint)}
.modnav button.next.right{text-align:right}
.modnav button .t{font-weight:700;font-size:14.5px;margin-top:3px;line-height:1.2}

.done-bar{display:flex;align-items:center;gap:14px;margin-top:30px;background:var(--paper-2);border:1px solid var(--line-2);border-radius:var(--r);padding:14px 18px}
.done-bar .tx{flex:1;font-family:"Archivo";font-weight:600;font-size:14px;color:var(--soft)}
.btn{font-family:"Archivo";font-weight:700;font-size:13.5px;border:0;border-radius:10px;padding:11px 17px;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:8px}
.btn.primary{background:var(--accent);color:var(--on-accent)}
.btn.primary:hover{background:var(--accent-deep)}
.btn.dark{background:var(--ink);color:#fff}
.btn.ghost{background:none;border:1.5px solid var(--line-2);color:var(--text)}
.btn.done-state{background:var(--green);color:#fff}

/* template box */
.tmpl{background:#fff;border:1px solid var(--line);border-left:4px solid var(--accent);border-radius:0 var(--r) var(--r) 0;padding:16px 18px;margin:18px 0;font-size:15.5px;line-height:1.55;position:relative}
.tmpl .tlabel{font-family:"Space Mono";font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--soft);margin-bottom:8px}
.tmpl .copy{position:absolute;top:12px;right:12px;font-family:"Archivo";font-weight:700;font-size:11px;background:var(--paper-2);border:1px solid var(--line-2);border-radius:7px;padding:5px 9px;cursor:pointer}
.tmpl .copy:hover{background:var(--accent);border-color:var(--accent)}
.tmpl .body{font-family:"Newsreader"}
/* ---------- FIGURES / ILLUSTRATIONS ---------- */
.fig{margin:26px 0;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px;box-shadow:var(--shadow);overflow:hidden}
.fig.dark{background:var(--ink);border-color:#000}
.fig svg{display:block;width:100%;height:auto}
.figcap{font-family:"Space Mono";font-size:11.5px;letter-spacing:.04em;color:var(--soft);margin-top:12px;text-align:center;line-height:1.5}
.fig.dark .figcap{color:#aab2bb}
.svg-l{font-family:"Archivo",sans-serif}
.svg-m{font-family:"Space Mono",monospace}

/* cover */
.cover{max-width:880px;margin:0 auto;padding:54px 26px 110px}
.cover .badge{display:inline-flex;align-items:center;gap:8px;font-family:"Space Mono";font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--soft);border:1px solid var(--line-2);border-radius:30px;padding:6px 14px;margin-bottom:26px}
.cover h1{font-family:"Archivo";font-weight:900;font-size:clamp(40px,8vw,76px);line-height:.94;letter-spacing:-.045em;margin:0 0 18px}
.cover h1 .hl{background:var(--accent);padding:0 .12em;box-decoration-break:clone}
.cover .sub{font-size:22px;line-height:1.5;color:#34383d;max-width:620px;margin:0 0 30px}
.cover .cta-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:44px}
.cover .map{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin-top:10px}
.cover .lvl{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px 18px;box-shadow:var(--shadow)}
.cover .lvl .n{font-family:"Space Mono";font-size:11px;color:var(--accent-deep);font-weight:700;letter-spacing:.06em}
.cover .lvl h4{font-family:"Archivo";font-weight:800;font-size:17px;margin:7px 0 6px;letter-spacing:-.01em}
.cover .lvl p{font-size:14.5px;line-height:1.45;color:var(--soft);margin:0;font-family:"Archivo"}
.cover .lvl ul{margin:9px 0 0;padding-left:17px;font-family:"Archivo";font-size:13px;color:var(--soft)}
.cover .lvl li{margin-bottom:3px}

.overlay{display:none}
@media(max-width:920px){
  .app{grid-template-columns:1fr}
  .spine{position:fixed;left:0;top:0;width:300px;max-width:86vw;z-index:60;transform:translateX(-104%);transition:transform .3s cubic-bezier(.3,.8,.3,1)}
  .app.open .spine{transform:translateX(0)}
  .menu-btn{display:grid;place-items:center}
  .overlay{display:block;position:fixed;inset:0;background:rgba(10,12,15,.5);z-index:55;opacity:0;pointer-events:none;transition:.3s}
  .app.open .overlay{opacity:1;pointer-events:auto}
  body{font-size:17px}
  .grid2,.out-grid,.cmp{grid-template-columns:1fr}
  .modnav{flex-direction:column}
}
@media (prefers-reduced-motion: reduce){*{transition:none!important;scroll-behavior:auto}}

/* ===== GATE — tela de acesso ===== */
#gate{position:fixed;inset:0;z-index:99999;background:#14181d;display:flex;align-items:center;justify-content:center;padding:24px;font-family:'Archivo',system-ui,sans-serif}
#gate.hidden{display:none}
.gate-card{width:100%;max-width:400px;background:#fbfaf6;border-radius:18px;padding:36px 30px;box-shadow:0 24px 70px rgba(0,0,0,.45);text-align:center}
.gate-logo{display:inline-flex;align-items:center;gap:7px;font-weight:800;font-size:14px;color:#14181d;background:#ffe000;padding:7px 14px;border-radius:8px;margin-bottom:22px}
.gate-card h1{font-size:22px;margin:0 0 8px;color:#14181d;font-weight:800;letter-spacing:-.01em}
.gate-card p{font-size:13.5px;color:#5d636b;margin:0 0 22px;line-height:1.55}
#gate-input{width:100%;box-sizing:border-box;padding:14px 16px;font-size:16px;font-family:'Space Mono',monospace;text-align:center;letter-spacing:1.5px;border:2px solid #e3ddd0;border-radius:10px;background:#fff;color:#14181d;text-transform:uppercase}
#gate-input:focus{outline:none;border-color:#3483fa}
#gate-btn{width:100%;margin-top:12px;padding:14px;font-size:15px;font-weight:800;color:#14181d;background:#ffe000;border:none;border-radius:10px;cursor:pointer;font-family:inherit}
#gate-btn:hover{filter:brightness(.96)}
#gate-err{min-height:18px;margin-top:12px;font-size:12.5px;color:#c8392f;font-weight:600}
.gate-buy{display:inline-block;margin-top:20px;font-size:12.5px;color:#5d636b;text-decoration:none;border-top:1px solid #ece6d9;padding-top:18px;width:100%;box-sizing:border-box}
.gate-buy b{color:#3483fa}

/* ===== Marca Martenine ===== */
.brand-logo{width:36px;height:36px;border-radius:9px;background:#fff;padding:3px;box-sizing:border-box;flex:0 0 auto;box-shadow:0 1px 4px rgba(0,0,0,.15)}
.cover-logo{display:block;width:60%;max-width:330px;height:auto;margin:0 0 20px}
.gate-logo{background:transparent !important;padding:0 !important;gap:9px}
.gate-logo img{width:30px;height:30px;border-radius:7px;background:#fff;padding:2px;box-sizing:border-box}

/* ===== Versão clara séria — fundo branco, neutro e profissional ===== */
:root{
  --paper:#ffffff; --paper-2:#f5f6f8; --card:#ffffff;
  --line:#e7e9ee; --line-2:#d9dce3;
  --text:#15181d; --soft:#586069; --faint:#878e97;
}
body{background:#ffffff}
.lede{color:#3a4047}
.reader em{color:#3a4047}
.cover .sub{color:#3a4047}
/* neutralizar os tons quentes (creme) -> cinzas limpos */
.callout.tip{background:#fffdf0;border-color:#efe2a0}
.callout.warn{background:#fdf1ed;border-color:#f0c9be}
table.tbl tr:nth-child(even) td{background:#f7f8fa}
.check:hover{background:#f5f6f8}
.tmpl{background:#fafbfc}
.gate-card{background:#ffffff !important}
/* cards e sombras mais discretos e sérios */
.cover .lvl{box-shadow:0 1px 2px rgba(16,18,24,.04),0 12px 28px -20px rgba(16,18,24,.2);transition:border-color .15s,box-shadow .15s,transform .15s}
.cover .lvl:hover{border-color:var(--line-2);box-shadow:0 1px 2px rgba(16,18,24,.05),0 16px 34px -22px rgba(16,18,24,.26);transform:translateY(-2px)}
.checklist,.calc,.fig{box-shadow:0 1px 2px rgba(16,18,24,.04),0 10px 26px -20px rgba(16,18,24,.18)}
.btn.primary:hover{filter:brightness(.97)}
/* sidebar dark levemente mais neutra */
.spine{background:#15181d}
</style>
</head>

<script>
"use strict";
/* ============ SAFE STORAGE (localStorage no Vercel; memória no preview) ============ */
const _mem={};
const store={
  get(k){ try{const v=localStorage.getItem(k);return v?JSON.parse(v):(_mem[k]??null);}catch(e){return _mem[k]??null;} },
  set(k,v){ try{localStorage.setItem(k,JSON.stringify(v));}catch(e){} _mem[k]=v; }
};
const KEY="mlos_v1";
let DB=store.get(KEY)||{done:{},checks:{},quiz:{}};
function save(){store.set(KEY,DB);}

/* ============ REGISTRY ============ */
const COURSE={};            // id -> {level, lvlLabel, num, title, sub, html}
function reg(id,data){COURSE[id]=data;}
const fmt=n=>"R$ "+(n).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2});
const pf=v=>{v=String(v).replace(/\./g,"").replace(",",".");const n=parseFloat(v);return isNaN(n)?0:n;};

/* ============ ICONS ============ */
const CHK='<svg viewBox="0 0 20 20" fill="none"><path d="M4 10.5l4 4 8-9" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>';

/* ============ NAV / ORDER (preenchido no boot) ============ */
let ORDER=[];   // array of ids in sequence (módulos só)
let NAVTREE=[]; // [{group, items:[{id,tool}]}]

/* ============ RENDER NAV ============ */
function buildNav(){
  const nav=document.getElementById("nav");
  nav.innerHTML="";
  NAVTREE.forEach(g=>{
    const h=document.createElement("div");h.className="nav-group";
    h.innerHTML=`<span>${g.group}</span><span class="ln"></span>`;nav.appendChild(h);
    g.items.forEach(it=>{
      const m=COURSE[it.id];if(!m)return;
      const b=document.createElement("button");
      b.className="nav-item"+(it.tool?" tool":"");
      b.dataset.id=it.id;
      const done=DB.done[it.id];
      const numHtml=it.tool?`<span class="num">${m.icon||"◆"}</span>`
        :`<span class="num ${done?"done":""}">${done?"✓":m.num}</span>`;
      b.innerHTML=`${numHtml}<span class="tx">${m.title}</span>`;
      b.onclick=()=>{go(it.id);closeDrawer();};
      nav.appendChild(b);
    });
  });
}
function refreshNav(){
  document.querySelectorAll(".nav-item").forEach(b=>{
    const id=b.dataset.id;b.classList.toggle("active",id===CURRENT);
    const num=b.querySelector(".num");
    if(num && !b.classList.contains("tool")){
      const done=DB.done[id];num.classList.toggle("done",!!done);
      num.textContent=done?"✓":COURSE[id].num;
    }
  });
}

/* ============ PROGRESS / THERMOMETER ============ */
function rankFor(p){
  if(p>=100)return["MercadoLíder Platinum","var(--t5)"];
  if(p>=80) return["MercadoLíder Gold","var(--t5)"];
  if(p>=60) return["Verde escuro","var(--t4)"];
  if(p>=40) return["Verde claro","var(--t4)"];
  if(p>=20) return["Amarelo","var(--t3)"];
  if(p>0)   return["Laranja","var(--t2)"];
  return["Conta nova","var(--t1)"];
}
function updateProgress(){
  const total=ORDER.length;
  const done=ORDER.filter(id=>DB.done[id]).length;
  const p=total?Math.round(done/total*100):0;
  document.getElementById("thermFill").style.height=p+"%";
  document.getElementById("pctNum").textContent=p+"%";
  const[label,color]=rankFor(p);
  const rb=document.getElementById("rankBadge");
  rb.querySelector("span").textContent=label;
  rb.querySelector("i").style.background=color;
  document.getElementById("miniProg").textContent=`${done}/${total} módulos`;
}

/* ============ ROUTER ============ */
let CURRENT=null;
function go(id){
  if(!COURSE[id])id="cover";
  CURRENT=id;
  const m=COURSE[id];
  const view=document.getElementById("view");
  if(id==="cover"){view.innerHTML=m.html();document.getElementById("crumb").innerHTML="Capa";wireView();window.scrollTo(0,0);refreshNav();return;}
  const idx=ORDER.indexOf(id);
  document.getElementById("crumb").innerHTML=`${m.lvlLabel} / <b>${m.title}</b>`;
  let h=`<div class="reader">`;
  h+=`<p class="eyebrow">${m.eyebrow||m.lvlLabel} ${m.num?`· <b>Módulo ${m.num}</b>`:""}</p>`;
  h+=`<h1 class="mod">${m.title}</h1>`;
  if(m.sub)h+=`<p class="lede">${m.sub}</p>`;
  h+=m.html;
  // done bar (módulos only)
  if(idx>=0){
    const d=DB.done[id];
    h+=`<div class="done-bar"><div class="tx">${d?"Módulo concluído — o termômetro subiu.":"Terminou de ler? Marque pra fazer o termômetro subir."}</div>
      <button class="btn ${d?"done-state":"primary"}" id="doneBtn">${d?CHK.replace(/#fff/g,'#fff')+" Concluído":"Marcar como concluído"}</button></div>`;
  }
  // mod nav
  if(idx>=0){
    const prev=ORDER[idx-1],next=ORDER[idx+1];
    h+=`<div class="modnav">
      <button ${prev?"":"disabled"} ${prev?`onclick="go('${prev}')"`:""}><span class="d">← Anterior</span><span class="t">${prev?COURSE[prev].title:"—"}</span></button>
      <button class="next right" ${next?"":"disabled"} ${next?`onclick="go('${next}')"`:""}><span class="d">Próximo →</span><span class="t">${next?COURSE[next].title:"Fim do curso 🎉"}</span></button>
    </div>`;
  }
  h+=`</div>`;
  view.innerHTML=h;
  wireView();
  window.scrollTo(0,0);
  refreshNav();
}

/* ============ WIRE INTERACTIONS ============ */
function wireView(){
  // checklists
  document.querySelectorAll(".check").forEach(c=>{
    const k=c.dataset.check;if(DB.checks[k])c.classList.add("done");
    c.onclick=()=>{c.classList.toggle("done");DB.checks[k]=c.classList.contains("done");save();updateChkCount(c);};
  });
  document.querySelectorAll(".checklist").forEach(updateChkCountList);
  // quizzes
  document.querySelectorAll(".quiz").forEach(q=>{
    const opts=q.querySelectorAll(".opt");const fb=q.querySelector(".fb");
    opts.forEach(o=>o.onclick=()=>{
      opts.forEach(x=>{x.disabled=true;if(x.dataset.correct)x.classList.add("right");});
      if(!o.dataset.correct)o.classList.add("wrong");
      if(fb)fb.classList.add("show");
      DB.quiz[q.dataset.quiz]=!!o.dataset.correct;save();
    });
  });
  // done button
  const db=document.getElementById("doneBtn");
  if(db)db.onclick=()=>{
    DB.done[CURRENT]=!DB.done[CURRENT];save();updateProgress();refreshNav();go(CURRENT);
  };
  // copy buttons
  document.querySelectorAll(".tmpl .copy").forEach(btn=>{
    btn.onclick=()=>{const t=btn.parentElement.querySelector(".body").innerText;
      navigator.clipboard&&navigator.clipboard.writeText(t);btn.textContent="Copiado ✓";setTimeout(()=>btn.textContent="Copiar",1400);};
  });
  // calculators
  document.querySelectorAll("[data-calc]").forEach(el=>CALC[el.dataset.calc]&&CALC[el.dataset.calc](el));
  // illustrations
  document.querySelectorAll("[data-art]").forEach(el=>{if(typeof ART!=="undefined"&&ART[el.dataset.art]){el.innerHTML=ART[el.dataset.art];}});
}
function updateChkCountList(list){
  const all=list.querySelectorAll(".check");const done=list.querySelectorAll(".check.done").length;
  const c=list.querySelector(".cnt");if(c)c.textContent=`${done}/${all.length}`;
}
function updateChkCount(c){const list=c.closest(".checklist");if(list)updateChkCountList(list);}

/* ============ CALCULATORS ============ */
const CALC={};
function fieldHTML(f){
  return `<div class="field"><label>${f.label} ${f.hint?`<span class="hint">${f.hint}</span>`:""}</label>
    <div class="inp">${f.pre?`<span class="pre">${f.pre}</span>`:""}
      <input data-f="${f.k}" inputmode="decimal" value="${f.v}" placeholder="0">
      ${f.suf?`<span class="suf">${f.suf}</span>`:""}</div></div>`;
}
function readF(el){const o={};el.querySelectorAll("input[data-f]").forEach(i=>o[i.dataset.f]=pf(i.value));return o;}

/* --- 1. Precificação reversa --- */
CALC.precos=function(el){
  el.innerHTML=`<div class="calc">
   <div class="calc-head"><b>Calculadora de preço mínimo viável</b><span>preço que garante sua margem depois de TODAS as taxas</span></div>
   <div class="calc-body">
     <div class="grid2">
       ${fieldHTML({label:"Custo do produto",pre:"R$",k:"custo",v:"30,00"})}
       ${fieldHTML({label:"Embalagem",pre:"R$",k:"emb",v:"2,50"})}
       ${fieldHTML({label:"Frete que VOCÊ paga",hint:"(frete grátis; 0 se o comprador paga)",pre:"R$",k:"frete",v:"0,00"})}
       ${fieldHTML({label:"Custo fixo ML",hint:"(itens < R$79)",pre:"R$",k:"fixo",v:"6,50"})}
       ${fieldHTML({label:"Comissão da categoria",suf:"%",k:"com",v:"14"})}
       ${fieldHTML({label:"Imposto (Simples etc.)",suf:"%",k:"imp",v:"6"})}
       ${fieldHTML({label:"Margem líquida desejada",suf:"%",k:"mrg",v:"20"})}
     </div>
     <div class="calc-out" data-out></div>
   </div></div>`;
  const out=el.querySelector("[data-out]");
  function calc(){
    const v=readF(el);
    const custoTotal=v.custo+v.emb+v.frete+v.fixo;
    const denom=1-(v.com+v.imp+v.mrg)/100;
    let html;
    if(denom<=0){html=`<div class="callout warn" style="margin:0">Comissão + imposto + margem somam 100% ou mais. Impossível precificar — reduza a margem desejada ou troque de produto/categoria.</div>`;}
    else{
      const preco=custoTotal/denom;
      const comR=preco*v.com/100, impR=preco*v.imp/100;
      const liquido=preco-comR-v.fixo, lucro=preco-custoTotal-comR-impR;
      const mrgReal=preco>0?lucro/preco*100:0;
      html=`<div class="out-big"><span class="l">Preço de venda sugerido</span><span class="v">${fmt(preco)}</span></div>
        <div class="out-grid">
          <div class="out-cell"><div class="l">ML fica com (comissão+fixo)</div><div class="v">${fmt(comR+v.fixo)}</div></div>
          <div class="out-cell"><div class="l">Imposto estimado</div><div class="v">${fmt(impR)}</div></div>
          <div class="out-cell good"><div class="l">Seu lucro líquido</div><div class="v">${fmt(lucro)}</div></div>
          <div class="out-cell"><div class="l">Margem real</div><div class="v">${mrgReal.toFixed(1)}%</div></div>
        </div>
        ${preco<79?`<div class="callout tip" style="margin:14px 0 0;font-size:14.5px"><b>Abaixo de R$ 79:</b> você paga o custo fixo cheio. Monte um <b>kit</b> pra passar de R$ 79 — o custo fixo some e você dilui frete e embalagem. Recalcule com o preço do kit.</div>`:`<div class="callout" style="margin:14px 0 0;font-size:14.5px;background:var(--green-soft);border-color:#b8ddc6">✓ Acima de R$ 79: sem custo fixo por unidade. Zere o campo "Custo fixo ML" e veja o preço cair.</div>`}`;
    }
    out.innerHTML=html;
  }
  el.querySelectorAll("input[data-f]").forEach(i=>i.addEventListener("input",calc));calc();
};

/* --- 2. Clássico x Premium --- */
CALC.cmp=function(el){
  el.innerHTML=`<div class="calc">
   <div class="calc-head"><b>Clássico × Premium — qual sobra mais?</b><span>compare o lucro líquido do mesmo SKU nos dois tipos de anúncio</span></div>
   <div class="calc-body">
     <div class="grid2">
       ${fieldHTML({label:"Preço de venda",pre:"R$",k:"preco",v:"120,00"})}
       ${fieldHTML({label:"Custo total",hint:"(produto+emb+frete)",pre:"R$",k:"custo",v:"55,00"})}
       ${fieldHTML({label:"Comissão Clássico",suf:"%",k:"cc",v:"13"})}
       ${fieldHTML({label:"Comissão Premium",suf:"%",k:"cp",v:"18"})}
       ${fieldHTML({label:"Imposto",suf:"%",k:"imp",v:"6"})}
       ${fieldHTML({label:"Custo fixo",hint:"(0 se ≥ R$79)",pre:"R$",k:"fixo",v:"0,00"})}
     </div>
     <div class="calc-out" data-out></div>
   </div></div>`;
  const out=el.querySelector("[data-out]");
  function line(rate){const v=readF(el);const com=v.preco*rate/100,imp=v.preco*v.imp/100;
    const lucro=v.preco-v.custo-com-imp-v.fixo;const m=v.preco>0?lucro/v.preco*100:0;return{com,lucro,m};}
  function calc(){
    const v=readF(el);const c=line(v.cc),p=line(v.cp);
    const cWin=c.lucro>=p.lucro;
    out.innerHTML=`<div class="cmp">
      <div class="col ${cWin?"win":""}"><h4>Clássico <span class="pill">${v.cc}%</span></h4>
        <div class="ln"><span>Comissão</span><span>−${fmt(c.com)}</span></div>
        <div class="ln"><span>Lucro líquido</span><span>${fmt(c.lucro)}</span></div>
        <div class="ln net"><span>Margem</span><span>${c.m.toFixed(1)}%</span></div></div>
      <div class="col ${!cWin?"win":""}"><h4>Premium <span class="pill">${v.cp}%</span></h4>
        <div class="ln"><span>Comissão</span><span>−${fmt(p.com)}</span></div>
        <div class="ln"><span>Lucro líquido</span><span>${fmt(p.lucro)}</span></div>
        <div class="ln net"><span>Margem</span><span>${p.m.toFixed(1)}%</span></div></div>
    </div>
    <div class="callout" style="margin:14px 0 0;font-size:14.5px">Diferença de lucro por venda: <b>${fmt(Math.abs(c.lucro-p.lucro))}</b>. ${cWin?"O <b>Clássico</b> deixa mais no bolso aqui — só vá de Premium se o ganho de conversão (parcelamento + exposição) compensar essa diferença em volume.":"O <b>Premium</b> compensa se você precisa do parcelamento e da exposição extra — comum em ticket alto (R$ 200+)."}</div>`;
  }
  el.querySelectorAll("input[data-f]").forEach(i=>i.addEventListener("input",calc));calc();
};

/* --- 3. ROAS de equilíbrio --- */
CALC.roas=function(el){
  el.innerHTML=`<div class="calc">
   <div class="calc-head"><b>ROAS de equilíbrio do Mercado Ads</b><span>abaixo desse ROAS, a campanha te dá prejuízo</span></div>
   <div class="calc-body">
     <div class="grid2">
       ${fieldHTML({label:"Margem de contribuição",hint:"(% que sobra ANTES da mídia)",suf:"%",k:"mrg",v:"25"})}
       ${fieldHTML({label:"ROAS objetivo que pretende usar",suf:"x",k:"obj",v:"6"})}
     </div>
     <div class="calc-out" data-out></div>
   </div></div>`;
  const out=el.querySelector("[data-out]");
  function calc(){
    const v=readF(el);const eq=v.mrg>0?100/v.mrg:0;
    const acosObj=v.obj>0?100/v.obj:0;
    const lucra=v.obj>=eq;
    out.innerHTML=`<div class="out-big"><span class="l">ROAS de equilíbrio</span><span class="v">${eq.toFixed(1)}x</span></div>
      <div class="out-grid">
        <div class="out-cell"><div class="l">= ACOS de equilíbrio</div><div class="v">${v.mrg.toFixed(0)}%</div></div>
        <div class="out-cell ${lucra?"good":"bad"}"><div class="l">Seu ROAS objetivo (${v.obj}x)</div><div class="v">${lucra?"Lucra ✓":"Prejuízo ✕"}</div></div>
        <div class="out-cell"><div class="l">ACOS do seu objetivo</div><div class="v">${acosObj.toFixed(1)}%</div></div>
        <div class="out-cell"><div class="l">Folga sobre o equilíbrio</div><div class="v">${(v.obj-eq).toFixed(1)}x</div></div>
      </div>
      <div class="callout" style="margin:14px 0 0;font-size:14.5px">Regra: defina o <b>ROAS objetivo acima do equilíbrio</b> (${eq.toFixed(1)}x). Anúncio novo aceita ROAS perto do equilíbrio pra ganhar tração; anúncio maduro aperta pra focar lucro. E lembre: ROAS só mede o clique pago — acompanhe o <b>TACOS</b> (gasto em Ads ÷ faturamento total) pra ver se a conta inteira não está ficando dependente de mídia.</div>`;
  }
  el.querySelectorAll("input[data-f]").forEach(i=>i.addEventListener("input",calc));calc();
};

reg("m1",{level:1,lvlLabel:"Nível 1 · Fundamentos",eyebrow:"Fundamentos",num:1,
 title:"Como o Mercado Livre realmente funciona",
 sub:"Antes de cadastrar qualquer anúncio: entenda que você não está só usando um site de classificados. Você está entrando numa máquina de confiança que decide, todo dia, quem aparece e quem some.",
 html:`
 <p>Cerca de <strong>4 em cada 10 compras online no Brasil</strong> passam pelo Mercado Livre. É o maior marketplace da América Latina — e isso muda tudo: existe tráfego permanente do outro lado do seu anúncio. Você não precisa "trazer cliente". O cliente já está lá. Seu trabalho é <em>ser escolhido</em>.</p>
 <h2>O modelo mudou: hoje você só paga se vender</h2>
 <p>Antigamente existiam os planos pagos (Prata, Ouro, Diamante): você pagava pra anunciar e, se não vendesse, o prejuízo era certo. Hoje o jogo é <strong>baseado em performance</strong> — criar anúncio é de graça, e a comissão só é cobrada quando a venda acontece. Isso é ótimo pra começar com pouco, mas tem uma contrapartida: como o ML não ganha com anúncio parado, ele entrega visibilidade só pra quem <em>converte e entrega bem</em>.</p>
 <div class="callout key"><div class="kicker">A frase que resume tudo</div><p><strong>Anunciar é fácil. Vender é difícil.</strong> Qualquer um sobe um anúncio em 5 minutos. O que separa quem fatura de quem reclama que "o ML não vende" é oferta certa + operação impecável + tráfego com método.</p></div>
 <h2>O ecossistema (e por que ele importa pra você)</h2>
 <p>O Mercado Livre não é um produto só. É um ecossistema onde cada peça empurra a outra:</p>
 <table class="tbl"><thead><tr><th>Peça</th><th>O que faz</th><th>Por que te afeta</th></tr></thead><tbody>
 <tr><td><b>Marketplace</b></td><td>A vitrine e o algoritmo de busca</td><td>Define se seu anúncio aparece na 1ª página ou no limbo</td></tr>
 <tr><td><b>Mercado Pago</b></td><td>Processa o pagamento e o parcelamento</td><td>Define quando o dinheiro cai e quanto custa antecipar</td></tr>
 <tr><td><b>Mercado Envios</b></td><td>Logística (Full, Flex, coletas)</td><td>Afeta prazo, conversão e até sua reputação</td></tr>
 <tr><td><b>Mercado Ads</b></td><td>Publicidade (Product Ads)</td><td>Acelera anúncio novo e disputa as primeiras posições</td></tr>
 </tbody></table>
 <p>A lógica que costura tudo: <strong>o ML investe pesado na experiência do comprador</strong>. Se o comprador tem uma experiência ruim por sua causa, quem perde reputação e exposição é você. Internalize isso e 80% das decisões ficam óbvias.</p>
 <h2>As 3 alavancas que você controla</h2>
 <p>Tudo que você vai aprender aqui cai em uma destas três alavancas:</p>
 <div class="stat-row">
  <div class="stat"><div class="v">1</div><div class="k">Oferta — produto certo no preço certo, com margem que sobrevive às taxas</div></div>
  <div class="stat"><div class="v">2</div><div class="k">Operação — logística, prazo, atendimento e reputação verde</div></div>
  <div class="stat"><div class="v">3</div><div class="k">Tráfego — posição orgânica (algoritmo) + Mercado Ads</div></div>
 </div>
 <p>Vendedor amador foca só na alavanca 3 ("preciso de mais visita"). Vendedor profissional sabe que <strong>tráfego sem oferta e sem operação só acelera o prejuízo</strong>. A ordem importa: arrume a oferta, blinde a operação, depois abra a torneira do tráfego.</p>
 <div class="quiz" data-quiz="q-m1"><div class="qk">Checagem rápida</div><p class="q">Você abriu a conta hoje e quer vender o máximo possível já na primeira semana. Qual é a jogada mais inteligente?</p>
 <button class="opt" data-correct="1">Acertar oferta e operação primeiro, e só então investir em tráfego/Ads</button>
 <button class="opt">Colocar todo o orçamento em Mercado Ads pra forçar visitas</button>
 <button class="opt">Subir 50 anúncios de produtos aleatórios pra "ver o que pega"</button>
 <div class="fb">Tráfego pago numa oferta mal precificada ou numa operação que vai atrasar entrega só multiplica problemas: você paga pra atrair cliente e ainda toma reclamação que derruba a reputação. Base primeiro, torneira depois.</div></div>
 `});

reg("m2",{level:1,lvlLabel:"Nível 1 · Fundamentos",eyebrow:"Fundamentos",num:2,
 title:"Abrindo e estruturando a conta",
 sub:"Cinco minutos pra criar a conta, mas as escolhas que você faz agora definem se vai poder emitir nota, virar Loja Oficial e escalar — ou ter que recomeçar lá na frente.",
 html:`
 <h2>Pessoa Física ou CNPJ?</h2>
 <p>Você <em>pode</em> começar como Pessoa Física pra testar. Mas pra operar de verdade, o CNPJ é quase obrigatório, por três motivos: emissão de <strong>nota fiscal</strong> (exigida em muitas categorias e por compradores PJ), tributação organizada e a porta de entrada pra <strong>Loja Oficial</strong>.</p>
 <table class="tbl"><thead><tr><th></th><th>Pessoa Física</th><th>CNPJ (MEI / Simples)</th></tr></thead><tbody>
 <tr><td><b>Começar rápido</b></td><td><span class="tag g">Sim</span></td><td>Precisa abrir empresa</td></tr>
 <tr><td><b>Emitir NF-e</b></td><td>Limitado</td><td><span class="tag g">Sim</span></td></tr>
 <tr><td><b>Escalar / volume</b></td><td><span class="tag r">Trava</span></td><td><span class="tag g">Liberado</span></td></tr>
 <tr><td><b>Loja Oficial</b></td><td>Não</td><td>Sim (com marca no INPI)</td></tr>
 </tbody></table>
 <div class="callout tip"><div class="kicker">Decisão prática</div><p>Vai testar 2–3 produtos sem volume? Pode começar PF. Tem estoque, fornecedor e intenção de escalar? Abra o <strong>CNPJ já</strong> (MEI até o limite de faturamento; Simples Nacional quando crescer) e configure tudo certo desde o primeiro anúncio.</p></div>
 <h2>Mercado Pago: onde o dinheiro mora</h2>
 <p>Toda venda é processada pelo Mercado Pago. Dois pontos que mexem no seu caixa:</p>
 <ul>
 <li><strong>Prazo de liberação</strong> — o dinheiro não cai na hora. Há um prazo até liberar o valor pra saque, que varia conforme sua reputação e configurações.</li>
 <li><strong>Antecipação</strong> — dá pra receber antes pagando uma taxa. Útil pra girar estoque, mas é custo: entre no cálculo de margem só se realmente precisar.</li>
 </ul>
 <h2>O "deserto de reputação" da conta nova</h2>
 <p>Conta nova nasce com o termômetro <strong>cinza/inativo</strong>. Ele só ativa depois das <strong>primeiras 10 vendas concluídas</strong>. Nessa fase, cada erro pesa muito mais — não existe volume pra diluir um atraso ou um cancelamento.</p>
 <div class="callout"><div class="kicker">Programa Decola</div><p>Pra novos vendedores, o ML oferece o <strong>Decola</strong>: mediante condições (e às vezes uma garantia), você rompe o "deserto" e já opera com cor verde-clara, acelerando a confiança do comprador desde as primeiras vendas. Vale ativar se você está começando e já tem operação redonda pra não estragar a chance.</p></div>
 <p>Por isso a regra de ouro do início: <strong>as primeiras 20–30 vendas você trata como ouro</strong>. Atendimento impecável, prazo cumprido, produto exatamente como anunciado. Esse histórico molda os meses seguintes.</p>

reg("m5",{level:2,lvlLabel:"Nível 2 · O anúncio que vende",eyebrow:"O anúncio que vende",num:5,
 title:"Tarifas, comissões e o custo real de vender",
 sub:"O preço do anúncio não é o que sobra pra você. Aqui você desmonta cada taxa do Mercado Livre em 2026 — incluindo as mudanças de março — pra nunca mais vender no prejuízo sem perceber.",
 html:`
 <h2>As três camadas da comissão</h2>
 <p>O que o ML cobra numa venda é a soma de até três coisas:</p>
 <table class="tbl"><thead><tr><th>Sigla</th><th>O que é</th><th>Quanto</th></tr></thead><tbody>
 <tr><td><b>Tarifa de venda</b></td><td>% sobre o preço do produto, por categoria e tipo de anúncio</td><td>Clássico 11–14% · Premium 16–19%</td></tr>
 <tr><td><b>Custo fixo</b></td><td>Valor fixo por unidade em itens de baixo valor</td><td>~R$ 5,50–6,75 (itens &lt; R$ 79)</td></tr>
 <tr><td><b>Financiamento</b></td><td>Custo do parcelamento sem juros / antecipação (quando você oferece)</td><td>Variável</td></tr>
 </tbody></table>
 <h2>O custo fixo é a pegadinha do baixo ticket</h2>
 <ul>
 <li>Produtos <strong>abaixo de R$ 79</strong> pagam o custo fixo por unidade (~R$ 5,50 a R$ 6,75 conforme a faixa).</li>
 <li>Produtos <strong>abaixo de R$ 12,50</strong> não pagam custo fixo, mas pagam <strong>50% do valor</strong> como tarifa — ou seja, um item de R$ 8 te devolve ~R$ 4.</li>
 <li>Produtos <strong>acima de R$ 79</strong> não pagam custo fixo por unidade. Só a comissão percentual.</li>
 <li>Em <strong>kit</strong> vendido por menos de R$ 79, o custo fixo é cobrado uma vez por kit (não por item).</li>
 </ul>
 <div class="callout warn"><div class="kicker">A conta que assusta</div><p>Um produto de <strong>R$ 25</strong> com comissão de 13% + custo fixo de R$ 6,00: o ML fica com ~<strong>37% do valor</strong>. Somando frete subsidiado em baixo ticket, a mordida pode chegar a ~44%. É por isso que baixo ticket <em>não escala</em> sem custo de produção muito baixo — ou sem virar kit.</p></div>
 <h2>O que mudou em março de 2026</h2>
 <ul>
 <li><strong>Custo por unidade virou variável</strong> em vários cenários: passou a ser calculado por <strong>peso e dimensões (cubagem)</strong> da embalagem, não mais um valor fixo único. Itens leves e pequenos podem ter melhorado; volumosos de baixo valor podem ter piorado.</li>
 <li><strong>Frete subsidiado</strong> passou a considerar <strong>cubagem</strong>, não só peso real. Produto grande e leve ficou mais caro de enviar.</li>
 <li><strong>Mercado Full</strong> reajustou armazenagem e retirada — estoque parado custa mais, incentivando giro.</li>
 </ul>
 <p>Lição operacional: <strong>toda mudança de tabela dispara revisão de preço dos seus SKUs campeões</strong>. Quem rodou no automático perdeu margem sem perceber.</p>
 <h2>Dois detalhes que muita gente erra</h2>
 <p><strong>1. O frete não entra na base da comissão</strong> (na maioria das categorias) — a comissão incide só sobre o preço do produto. Mas o <em>frete grátis subsidiado</em> é custo seu; vendedor verde-escuro mantém subsídio de até 70%, o que na prática reduz o custo real em itens acima de R$ 79.</p>
 <p><strong>2. Paridade de preço</strong> — desde o fim de 2025, o ML monitora se o <em>mesmo produto seu</em> está mais barato em outro marketplace (Amazon, Shopee). Se achar diferença, exige paridade em até 3 dias. Planeje preço de forma coerente entre canais.</p>
 <div class="callout tip"><div class="kicker">Não decore percentuais</div><p>Cada subcategoria tem seu número. <strong>Antes de precificar um SKU campeão, confira o percentual exato na Central do Vendedor</strong> — e cheque se o produto está na categoria certa (categoria errada = comissão errada).</p></div>
 `});

reg("m6",{level:2,lvlLabel:"Nível 2 · O anúncio que vende",eyebrow:"O anúncio que vende",num:6,
 title:"Precificação com margem real",
 sub:"Esqueça 'custo + 30%'. Esse cálculo ignora comissão, custo fixo, frete e imposto — e é o motivo de tanta gente vender muito e não sobrar nada. Aqui está a fórmula que parte do lucro que VOCÊ quer.",
 html:`
 <h2>A fórmula do preço mínimo viável</h2>
 <p>Em vez de partir do custo e chutar uma margem, você parte da margem que quer e calcula pra trás:</p>
 <div class="callout key"><div class="kicker">A fórmula</div><p style="font-family:'Space Mono';font-size:16px;line-height:1.7"><strong>Preço = (Custo + Frete + Custo fixo) ÷ (1 − Comissão% − Imposto% − Margem%)</strong></p><p style="margin-top:10px;font-size:14.5px">Todos os percentuais em decimal. O frete entra só se for grátis pro comprador (você paga).</p></div>
 <h3>Exemplo real</h3>
 <p>Fronha que te custa R$ 18, frete médio R$ 11, custo fixo R$ 6 (faixa R$ 20–79), comissão Clássica 12%, você quer 25% de margem líquida:</p>
 <p style="font-family:'Space Mono';font-size:15px;background:var(--paper-2);padding:14px 16px;border-radius:10px">Preço = (18 + 11 + 6) ÷ (1 − 0,12 − 0,25)<br>Preço = 35 ÷ 0,63 = <strong>R$ 55,55</strong></p>
 <p>Se você vendia essa fronha por R$ 45 "porque o concorrente cobra isso", estava no <strong>prejuízo</strong> e nem sabia.</p>
 <div class="fig"><div data-art="preco"></div><div class="figcap">Cada camada empilha sobre o custo. O preço final cobre tudo e ainda deixa a sua margem em pé.</div></div>
 <div class="callout warn"><div class="kicker">O erro que dói</div><p>Margem se calcula <strong>sobre o preço de venda, nunca sobre o custo</strong>. Comissão de 16% sobre R$ 100 é R$ 16. Muita gente aplica 16% sobre o custo, acha que está protegida, e perde dinheiro em toda venda.</p></div>
 <h2>Sua calculadora</h2>
 <p>Coloque os números do seu produto. Ela já mostra o preço sugerido, quanto o ML leva, seu lucro líquido e a margem real — e avisa quando vale montar kit:</p>
 <div data-calc="precos"></div>
 <h2>Kit: a arma contra o custo fixo</h2>
 <p>Sempre que o produto fica preso abaixo de R$ 79, o kit é a saída: ao elevar o ticket além de R$ 79 você <strong>elimina o custo fixo por unidade</strong> e dilui frete e embalagem entre mais peças. Recalcule com o preço do kit e veja a margem respirar.</p>
 <div class="quiz" data-quiz="q-m6"><div class="qk">Checagem rápida</div><p class="q">Custo R$ 40, comissão 14%, imposto 6%, sem frete grátis, sem custo fixo (item &gt; R$79). Você quer 20% de margem líquida. O preço sai aproximadamente…</p>
 <button class="opt" data-correct="1">R$ 66,67 — porque 40 ÷ (1 − 0,14 − 0,06 − 0,20) = 40 ÷ 0,60</button>
 <button class="opt">R$ 48,00 — custo + 20%</button>
 <button class="opt">R$ 56,00 — custo + 14% + 20%</button>
 <div class="fb">A margem e as taxas saem do PREÇO, então elas vão no denominador: 1 − 0,14 − 0,06 − 0,20 = 0,60. Preço = 40 ÷ 0,60 = R$ 66,67. Somar percentuais sobre o custo (as outras opções) subestima o preço e mata a margem.</div></div>
 `});

reg("m7",{level:2,lvlLabel:"Nível 2 · O anúncio que vende",eyebrow:"O anúncio que vende",num:7,
 title:"Anatomia do anúncio campeão",
 sub:"Mesmo produto, mesmo preço: um anúncio vende 10×, o outro fica parado. A diferença está em seis elementos que você controla — e que também alimentam o algoritmo de busca.",
 html:`
 <p>Antes de detalhar, veja o mapa do que o comprador encontra — e o que você controla em cada ponto:</p>
 <div class="fig"><div data-art="anatomia"></div><div class="figcap">A página do anúncio: cada número é uma alavanca de venda e de ranqueamento que você controla.</div></div>
 <h2>1. Título — é SEO, não enfeite</h2>
 <p>O título é o <strong>fator nº 1 de SEO</strong> e o limite é de <strong>60 caracteres</strong> — use todos com informação útil. Coloque a <strong>palavra-chave principal no começo</strong> (o que mais "pesa" e o que aparece primeiro no mobile). Estrutura que funciona:</p>
 <div class="fig"><div data-art="titulo"></div><div class="figcap">Produto na frente, depois marca, atributo decisivo e variante/benefício. Termos reais do autocomplete, não os que você "acha".</div></div>
 <p>Descubra os termos no <strong>autocomplete da busca</strong>, na página <em>tendencias.mercadolivre.com.br</em> e nos títulos dos <em>mais vendidos</em> da categoria. Não empilhe sinônimos sem propósito (o algoritmo entende coerência, não excesso), e não gaste espaço com "frete grátis" ou "promoção" — o ML já mostra o frete.</p>
 <div class="tmpl"><button class="copy">Copiar</button><div class="tlabel">Modelo de título</div><div class="body">Fone Bluetooth Sem Fio JBL Tune 510BT Original Dobrável com Microfone Preto</div></div>
 <h2>2. Ficha técnica — preencha 100%</h2>
 <p>A ficha técnica não é burocracia: cada campo funciona como uma <strong>palavra-chave de cauda longa</strong> e <strong>alimenta os filtros de busca</strong>. Quando o comprador filtra por marca, cor, tamanho ou voltagem, <strong>só aparecem anúncios com aquele campo preenchido</strong> — ficha incompleta é simplesmente descartada do filtro. Preencha tudo que se aplica, e não esqueça o <strong>GTIN/EAN</strong> (código de barras): ele ajuda o algoritmo a identificar o produto e aumenta visibilidade e confiança. E confira a <strong>categoria correta e específica</strong>: categoria errada cobra comissão errada e te esconde do comprador certo.</p>
 <div class="callout tip"><div class="kicker">Score de qualidade 0–100</div><p>O ML dá uma nota de qualidade pra cada anúncio. <strong>Mantenha acima de 80.</strong> Se está baixo, o problema quase sempre é título, ficha incompleta, categoria ou fotos — corrija item a item.</p></div>
 <h2>3. Fotos — é o que ganha o clique</h2>
 <p>Dado do próprio ML: vendedores que melhoraram as fotos <strong>aumentaram o faturamento entre 15% e 30%</strong>. A foto de capa é o que faz seu anúncio ser clicado entre mil. As regras:</p>
 <div class="fig"><div data-art="fotos"></div><div class="figcap">À esquerda converte e é aprovada; à direita o ML rejeita ou penaliza. Capriche na capa.</div></div>
 <ul>
 <li><strong>1ª foto fundo branco</strong>, produto ocupando ~95% do quadro, centralizado e nítido. Tamanho ideal <strong>1200×1200px</strong> (permite zoom).</li>
 <li>Fundo branco hoje é <strong>opcional na maioria das categorias</strong> (pode usar contexto a partir da 2ª foto) — mas <strong>continua obrigatório em Tecnologia, Beleza, Saúde e Supermercado</strong>.</li>
 <li>Mostre <strong>vários ângulos, escala</strong> (o tamanho real), detalhes, o produto <strong>em uso</strong> e <strong>o que vem na caixa</strong>.</li>
 <li><strong>Nunca</strong> coloque marca d'água, logo da loja, banner ("Oferta!"), QR code, dados de contato, bordas ou selos que só o ML atribui ("Full", "Mais vendido", "MercadoLíder").</li>
 </ul>
 <h2>4. Descrição — responda antes de perguntarem</h2>
 <p>Use <strong>texto puro</strong> (HTML e emoji podem ser rejeitados), organizado em blocos escaneáveis. Liste compatibilidade, medidas, conteúdo da caixa, voltagem, garantia e os 3 diferenciais — insira os termos do comprador de forma natural, sem "enfileirar" palavra-chave (isso é spam e o ML entende). Cada dúvida antecipada aqui é uma reclamação que não vira mediação lá na frente.</p>

reg("m13",{level:4,lvlLabel:"Nível 4 · Tráfego & Escala",eyebrow:"Tráfego & Escala",num:13,

 <div class="callout key"><div class="kicker">Foco gera lucro</div><p>A maioria perde tempo igual em todos os produtos. O profissional concentra energia, estoque e mídia nos <strong>itens A</strong> — e usa os C só pra completar catálogo, não pra prender capital. Reposição no Full se planeja pela curva: A sempre abastecido, C quase nunca.</p></div>
 <h2>Catálogo do ML: a disputa pela "buy box"</h2>

 <li><strong>Marca própria</strong> — o pulo do gato da margem. Com marca registrada você sai da guerra de preço do produto genérico, controla o catálogo do seu item e constrói um ativo que é só seu. É o caminho de quem quer parar de revender o que todo mundo revende.</li>

 <div class="check" data-check="c-m13-5"><span class="box">${CHK}</span><span class="tx">Penso em marca própria pra fugir da guerra de preço</span></div>

reg("m14",{level:4,lvlLabel:"Nível 4 · Tráfego & Escala",eyebrow:"Tráfego & Escala",num:14,
 title:"Métricas, BI e gestão financeira",
 sub:"Faturamento alto não é lucro. Muito seller fatura R$100 mil e não sabe se ganhou ou perdeu dinheiro. Aqui você instala o painel de controle: o que medir, como conciliar e por que o fluxo de caixa decide se você sobrevive.",
 html:`
 <h2>O erro que quebra seller lucrativo</h2>
 <p>O Mercado Livre <strong>não</strong> deposita o valor cheio da venda na hora. Ele desconta comissão, custo fixo e frete, e libera o dinheiro depois de um prazo (que varia com sua reputação). Quem confunde "vendi R$ 100 mil" com "tenho R$ 100 mil" compra estoque que não pode pagar e quebra no auge das vendas. <strong>Faturamento é vaidade, lucro é sanidade, caixa é sobrevivência.</strong></p>
 <h2>Conciliação: bater o que entrou com o que deveria entrar</h2>
 <p>Pra cada venda, confira se o valor líquido depositado bate com o esperado (preço − comissão − custo fixo − frete que é seu). É aqui que se descobre cobrança indevida, frete que veio errado e produto que estava no prejuízo sem ninguém perceber. Sem conciliação, você opera no escuro.</p>
 <h2>As métricas que realmente importam</h2>
 <table class="tbl"><thead><tr><th>Métrica</th><th>O que revela</th></tr></thead><tbody>
 <tr><td><b>Margem de contribuição</b></td><td>Quanto sobra por venda DEPOIS de todas as taxas e custo do produto. A verdade do lucro.</td></tr>
 <tr><td><b>Ticket médio (AOV)</b></td><td>Valor médio por pedido. Subir ticket (kit, cross-sell) dilui custo fixo e frete.</td></tr>
 <tr><td><b>Taxa de conversão</b></td><td>Visitas que viram venda. O sinal-mestre do algoritmo e da saúde do anúncio.</td></tr>
 <tr><td><b>TACOS</b></td><td>Gasto em Ads ÷ faturamento total. Mostra se você depende demais de mídia paga.</td></tr>
 <tr><td><b>Recompra / LTV</b></td><td>Quanto um cliente vale ao longo do tempo. Recompra alta = operação madura e barata de crescer.</td></tr>
 <tr><td><b>Giro de estoque</b></td><td>Quão rápido o estoque vira venda. Estoque parado é dinheiro preso (e armazenagem cara no Full).</td></tr>
 </tbody></table>
 <div class="callout key"><div class="kicker">Painel mínimo de BI</div><p>Você não precisa de um sistema caro pra começar — precisa <strong>olhar os números toda semana</strong>. Faturamento, margem líquida real, ticket médio, conversão e TACOS. Quem mede toma decisão; quem não mede, torce. Ferramentas de BI (planilha ou dashboard conectado à API) só automatizam esse olhar.</p></div>
 <div class="fig"><div data-art="caixa"></div><div class="figcap">O dinheiro sai antes de entrar. O vão entre pagar o estoque e receber do ML é o capital de giro que precisa existir.</div></div>
 <h2>Fluxo de caixa: o oxigênio da operação</h2>
 <p>Mapeie <strong>quando o dinheiro entra</strong> (liberação do ML, que depende da reputação) e <strong>quando sai</strong> (fornecedor, imposto, Ads, embalagem). Operação que cresce rápido suga caixa: você paga o estoque <em>antes</em> de receber das vendas. Reserva de caixa não é luxo — é o que te impede de quebrar justamente quando está vendendo bem.</p>
 <div class="callout warn"><div class="kicker">Imposto não é opcional</div><p>O ML reporta suas vendas ao fisco. Operar como PF acima dos limites ou ignorar imposto é bomba-relógio. Tenha CNPJ adequado, regime tributário definido e o imposto <strong>embutido no preço</strong> (lembra da fórmula do Módulo 6?). Lucro que não considera imposto é lucro imaginário.</p></div>
 <div class="checklist"><div class="cl-head"><span class="ic">📊</span><b>Checklist — controle financeiro mínimo</b><span class="cnt"></span></div>
 <div class="check" data-check="c-m14-1"><span class="box">${CHK}</span><span class="tx">Concilio o que o ML deposita com o que eu esperava receber</span></div>
 <div class="check" data-check="c-m14-2"><span class="box">${CHK}</span><span class="tx">Conheço minha margem de contribuição real por produto</span></div>
 <div class="check" data-check="c-m14-3"><span class="box">${CHK}</span><span class="tx">Acompanho fluxo de caixa: quando entra × quando sai</span></div>
 <div class="check" data-check="c-m14-4"><span class="box">${CHK}</span><span class="tx">Tenho reserva de caixa pra sustentar o crescimento</span></div>
 <div class="check" data-check="c-m14-5"><span class="box">${CHK}</span><span class="tx">O imposto está embutido no preço, não é surpresa</span></div>
 <div class="check" data-check="c-m14-6"><span class="box">${CHK}</span><span class="tx">Olho meu painel de métricas toda semana</span></div>
 </div>
 <div class="quiz" data-quiz="q-m14"><div class="qk">Checagem rápida</div><p class="q">Você faturou R$ 80 mil no mês e está empolgado. Qual número diz se o mês foi realmente bom?</p>
 <button class="opt" data-correct="1">A margem de contribuição líquida — o que sobrou depois de TODAS as taxas, custos e imposto</button>
 <button class="opt">O faturamento bruto, R$ 80 mil já é a resposta</button>
 <button class="opt">O número de vendas, só isso importa</button>
 <div class="fb">Faturamento é vaidade. Dá pra faturar R$ 80 mil e ter prejuízo se a margem não cobre comissão, custo fixo, frete, produto, Ads e imposto. A margem de contribuição líquida é o número que diz se o mês pagou as contas e ainda sobrou — e se a conta fecha, o caixa confirma.</div></div>
 `});

reg("m15",{level:5,lvlLabel:"Nível 5 · Profissional",eyebrow:"Profissional",num:15,
 title:"Operação de alto faturamento",
 sub:"O salto final não é vender mais — é montar uma máquina que vende sem depender de você o tempo todo. Processo, gente, diversificação e um plano de 90 dias pra sair do operacional e entrar na gestão.",
 html:`
 <h2>De vendedor a dono de operação</h2>
 <p>No começo você faz tudo: anuncia, embala, responde, despacha. Funciona até travar — o gargalo vira você. O profissional <strong>documenta e delega</strong>: transforma cada tarefa repetida num processo que outra pessoa (ou um sistema) executa igual, todo dia, sem depender da sua memória.</p>
 <h2>Os processos que você precisa padronizar</h2>
 <table class="tbl"><thead><tr><th>Área</th><th>Vire processo (não dependa de você)</th></tr></thead><tbody>

 <tr><td><b>Atendimento</b></td><td>Biblioteca de respostas-modelo + regra de tempo de resposta</td></tr>
 <tr><td><b>Reposição</b></td><td>Ponto de pedido por curva ABC: quando o estoque de cada A chega em X, recompra automática</td></tr>
 <tr><td><b>Financeiro</b></td><td>Conciliação semanal e fechamento mensal de margem e caixa</td></tr>
 </tbody></table>
 <div class="callout key"><div class="kicker">A regra da delegação</div><p>Só dá pra delegar o que está <strong>escrito e medido</strong>. Antes de contratar, documente a tarefa num passo-a-passo que qualquer pessoa siga e num indicador que diga se foi bem feita. Contratar sem processo é só transferir o caos pra mais gente.</p></div>
 <h2>Diversificação: não dependa de um só canal</h2>
 <p>O Mercado Livre é uma plataforma poderosa — e um <strong>risco de concentração</strong>. Mudança de taxa, suspensão de conta ou queda de reputação podem derrubar 100% do faturamento de quem só vende lá. O profissional usa o ML como motor principal e, com a operação madura, expande:</p>
 <ul>
 <li><strong>Outros marketplaces</strong> (Shopee, Amazon, Magalu) — mesmo produto, mais vitrines. Exige integração de estoque pra não vender o que não tem.</li>
 <li><strong>Loja própria</strong> — site/e-commerce onde a margem é maior e o cliente é seu (sem comissão de marketplace).</li>
 <li><strong>Base de clientes</strong> — recompra e relacionamento direto, o ativo que nenhum marketplace tira de você.</li>
 </ul>
 <div class="callout warn"><div class="kicker">Sequência importa</div><p>Diversifique <em>depois</em> de dominar o ML, não antes. Espalhar-se cedo demais, sem processo nem estoque integrado, transforma um canal bom em vários canais medíocres. Domine um, depois multiplique.</p></div>
 <h2>Seu plano de 90 dias</h2>
 <div class="stat-row">
   <div class="stat"><div class="k">Dias 1–30 · Fundação</div><div class="v">Acertar o básico</div><div class="d">Conta estruturada, 1–3 produtos validados pelos 5 filtros, anúncios no padrão campeão, primeiras vendas limpas pra sair do deserto de reputação.</div></div>
   <div class="stat"><div class="k">Dias 31–60 · Tração</div><div class="v">Ganhar reputação e giro</div><div class="d">Termômetro verde, Full nos campeões, Ads com ROAS acima do equilíbrio, conciliação semanal rodando, curva ABC definida.</div></div>
   <div class="stat"><div class="k">Dias 61–90 · Escala</div><div class="v">Virar operação</div><div class="d">Processos documentados, reposição automática por curva, ampliação de catálogo/kits, primeiros passos de diversificação ou marca própria.</div></div>
 </div>
 <div class="callout key"><div class="kicker">A base está pronta</div><p>Você montou a operação inteira: do "como o ML funciona" até "operação que roda sozinha". O que separa quem aplica de quem só lê é a <strong>execução constante</strong> — usar as calculadoras antes de precificar, rodar os checklists toda semana, medir os números e corrigir rápido. No <strong>Nível 6</strong> vem o jogo avançado: inteligência de dados, promoções com método, blindagem da conta e o diagnóstico que conserta qualquer anúncio.</p></div>
 <div class="checklist"><div class="cl-head"><span class="ic">🏆</span><b>Checklist — operação profissional</b><span class="cnt"></span></div>
 <div class="check" data-check="c-m15-1"><span class="box">${CHK}</span><span class="tx">Documentei meus processos (cadastro, expedição, atendimento, reposição)</span></div>
 <div class="check" data-check="c-m15-2"><span class="box">${CHK}</span><span class="tx">Tenho reposição automática por ponto de pedido na curva A</span></div>

 <div class="check" data-check="c-m15-4"><span class="box">${CHK}</span><span class="tx">Tenho plano de diversificação pra não depender de um canal só</span></div>
 <div class="check" data-check="c-m15-5"><span class="box">${CHK}</span><span class="tx">Estou construindo marca própria e/ou base de clientes</span></div>
 <div class="check" data-check="c-m15-6"><span class="box">${CHK}</span><span class="tx">Sigo um plano 30-60-90 com metas claras por fase</span></div>

 sub:"Parar de chutar é o que separa o profissional. Quem decide produto, preço e título com dados acerta mais e arrisca menos. Aqui estão as fontes — várias de graça — pra você enxergar o mercado antes de investir.",

 <li><strong>Autocomplete da busca</strong> — comece a digitar na barra do ML e veja o que ele sugere. São <em>termos reais</em> que compradores digitam. Ouro puro pra título e ficha.</li>
 <li><strong>tendencias.mercadolivre.com.br</strong> — mostra, quase em tempo real, o que está subindo em buscas e categorias. Antecipe sazonalidade e ondas.</li>
 <li><strong>Mais vendidos por categoria</strong> — entre nos líderes: que preço praticam, quantas vendas têm, e principalmente <em>o que reclamam nas perguntas e avaliações</em>. Cada reclamação recorrente do concorrente é uma oportunidade pra você fazer melhor.</li>
 </ul>
 <h2>Ferramentas de dados (aceleram muito o garimpo)</h2>
 <p>Plataformas como <strong>Nubimetrics</strong> e <strong>JoomPulse</strong> mostram curva de demanda, sazonalidade, nível de concorrência por subcategoria e <em>palavras com compra</em> (termos usados por quem está pronto pra fechar). O <strong>Explorador de Categorias</strong> ajuda a achar nichos com <strong>baixa saturação</strong> — categorias com poucos vendedores Platinum, onde dá pra ranquear sem ser o mais barato.</p>
 <div class="callout key"><div class="kicker">A jogada de quem cresce</div><p>Não brigue onde todo mundo briga. Use os dados pra achar a <strong>categoria certa</strong> (demanda boa + concorrência atacável) e os <strong>termos certos</strong> (intenção alta + competição viável). Mirar nicho específico vale mais que disputar o termo amplo e saturado.</p></div>
 <h2>Espionar concorrente do jeito certo</h2>
 <p>Não siga qualquer vendedor — só os <strong>relevantes pro seu nicho</strong>. Monitore: que produtos eles adicionaram, que preço mexeram, que kits montaram, e o que os compradores reclamam. Ferramentas de monitoramento te avisam quando um rival muda preço ou lança algo, pra você reagir rápido. Observar a concorrência não é copiar — é achar a brecha que ela deixou aberta.</p>
 <div class="callout warn"><div class="kicker">Popularidade não é lucro</div><p>O que "bomba" costuma ter margem esmagada por frete, taxa e guerra de preço. Sempre cruze <strong>tendência × concorrência × margem por SKU</strong> antes de comprar estoque. Validar demanda é metade; a outra metade é a conta fechar.</p></div>
 <div class="checklist"><div class="cl-head"><span class="ic">🔬</span><b>Checklist — garimpo orientado por dados</b><span class="cnt"></span></div>
 <div class="check" data-check="c-m16-1"><span class="box">${CHK}</span><span class="tx">Coletei termos reais no autocomplete e na página de tendências</span></div>

reg("m18",{level:6,lvlLabel:"Nível 6 · Domínio Total",eyebrow:"Domínio Total",num:18,
 title:"Segurança da conta: o que suspende e como recorrer",
 sub:"Uma conta suspensa para seu faturamento da noite pro dia e congela seu caixa. A boa notícia: quase tudo é evitável. Conhecer os gatilhos e ter processo é o que protege o negócio que você construiu.",
 html:`
 <h2>O mapa do risco</h2>
 <p>Existem dois tipos de suspensão: <strong>temporária</strong> (você fica um tempo sem vender, geralmente reversível) e <strong>permanente</strong> (banimento, por infração grave). Veja o que leva a cada uma:</p>
 <div class="fig"><div data-art="risco"></div><div class="figcap">À esquerda, gatilhos de banimento permanente; à direita, de suspensão/advertência. Conhecer é metade da prevenção.</div></div>
 <h2>Os erros que banem de vez</h2>
 <ul>
 <li><strong>Contato fora da plataforma</strong> — pôr WhatsApp/e-mail no anúncio ou levar o comprador pra negociar fora. É uma das maiores causas, e o ML trata como fraude (perde a comissão dele).</li>
 <li><strong>Múltiplas contas</strong> — operar com várias identidades, especialmente depois de uma suspensão. O ML detecta até por IP e pode banir <em>todos os CNPJs ligados</em>.</li>
 <li><strong>Produto proibido ou réplica</strong> — pirata, falsificado, restrito, ou que viole marca/direito autoral. O algoritmo detecta e o ML aciona autoridades em casos graves.</li>
 <li><strong>Dado cadastral falso</strong> ou foto que não corresponde ao produto (gera devolução e reclamação em massa).</li>
 </ul>
 <h2>Os que advertem e podem escalar</h2>
 <p><strong>Cancelamentos pelo vendedor ≥ 2,5%</strong> podem advertir, suspender ou banir — por isso nunca anuncie sem estoque garantido. Some a isso reclamações e atrasos acima do limite, fatura/Mercado Pago em aberto, e uso indevido de cupons/benefícios. Reputação estourada é a porta de entrada da suspensão.</p>
 <div class="callout warn"><div class="kicker">Caiu? O passo a passo do recurso</div><p><strong>1.</strong> Leia a notificação (e-mail/painel) — ela diz o motivo; não presuma. <strong>2.</strong> Congele o risco: pause o SKU/anúncio problemático, ajuste prazo e estoque. <strong>3.</strong> Junte evidências: NF de compra, prints, rastreios, conversas, documentos de identidade/empresa. <strong>4.</strong> Envie um <strong>plano de correção curto e objetivo, em bullets</strong>, mostrando que você identificou o erro, corrigiu e criou medida pra não repetir. Apelo emocional não resolve; plano profissional, sim.</p></div>
 <div class="callout key"><div class="kicker">Prevenção é sistema, não sorte</div><p>Monitore suas métricas <em>antes</em> de estourarem. A maioria só descobre que estava "no limite" quando a conta cai. Rotina semanal de reputação (Módulo 9) + compliance de anúncio (sem contato externo, sem produto sensível, foto fiel) = risco perto de zero.</p></div>
 <div class="checklist"><div class="cl-head"><span class="ic">🛡️</span><b>Checklist — blindagem da conta</b><span class="cnt"></span></div>

 <div class="check" data-check="c-m18-3"><span class="box">${CHK}</span><span class="tx">Não vendo réplica/produto restrito; fotos fiéis ao item</span></div>
 <div class="check" data-check="c-m18-4"><span class="box">${CHK}</span><span class="tx">Cancelamento pelo vendedor controlado (bem abaixo de 2,5%)</span></div>
 <div class="check" data-check="c-m18-5"><span class="box">${CHK}</span><span class="tx">Guardo NF de compra dos produtos pra comprovar origem</span></div>

reg("m19",{level:6,lvlLabel:"Nível 6 · Domínio Total",eyebrow:"Domínio Total",num:19,
 title:"Diagnóstico: por que meu anúncio não vende",
 sub:"O capstone prático. Quando um anúncio não performa, não chute. Leia o funil de cima pra baixo: cada degrau tem um culpado diferente e um conserto diferente. Este é o método que você vai usar pra sempre.",
 html:`
 <p>Todo anúncio passa por três degraus: ser <strong>mostrado</strong> (impressões), ser <strong>clicado</strong> (CTR) e <strong>converter</strong> (venda). O problema está sempre num degrau específico — descubra qual antes de mexer em qualquer coisa.</p>
 <div class="fig"><div data-art="funil"></div><div class="figcap">O diagnóstico em ordem: impressões → cliques → vendas. Conserte o degrau certo, não o que parece óbvio.</div></div>
 <h2>Degrau 1 — Poucas impressões</h2>
 <p>Se quase ninguém vê seu anúncio, o problema é de <strong>descoberta</strong>: SEO e relevância.</p>
 <ul>
 <li>Título sem as palavras-chave reais que o comprador digita.</li>
 <li>Ficha técnica incompleta (some dos filtros) ou <strong>categoria errada</strong>.</li>
 <li>Reputação baixa ou anúncio sem histórico (recém-nascido sem tração).</li>
 <li>Frete/Full pesando contra na elegibilidade de vitrine.</li>
 </ul>
 <h2>Degrau 2 — Vê, mas não clica (CTR baixo)</h2>
 <p>Aparece bastante mas ninguém entra: o que falha é a <strong>vitrine</strong> — o que o comprador vê na lista.</p>
 <ul>
 <li><strong>Foto de capa</strong> fraca, escura ou que não destaca o produto.</li>
 <li>Preço fora da curva na comparação direta da busca.</li>
 <li>Título pouco claro ou sem o benefício decisivo na frente.</li>
 <li>Sem selo "chega amanhã"/Full enquanto o concorrente tem.</li>
 </ul>
 <h2>Degrau 3 — Clica, mas não compra (conversão baixa)</h2>
 <p>Entra no anúncio e desiste: a página não fechou a venda.</p>
 <ul>
 <li>Preço/parcelamento não competitivo na decisão final (teste Premium em ticket alto).</li>
 <li>Fotos internas insuficientes, sem escala, sem "o que vem na caixa".</li>
 <li>Ficha/descrição não tiram a dúvida (compatibilidade, medida, garantia).</li>
 <li>Poucas avaliações / reputação que não passa confiança.</li>
 <li>Frete caro ou prazo longo no checkout.</li>
 </ul>
 <div class="callout key"><div class="kicker">A ordem importa</div><p>Não recrie o anúncio (zera o histórico) nem corte o preço por reflexo. <strong>Meça primeiro</strong>: muitas impressões e poucos cliques é problema de vitrine (foto/preço/título); muitos cliques e poucas vendas é problema de página (fotos internas/ficha/confiança). Conserte a causa, não o sintoma — e dê tempo pro anúncio reagir antes de mexer de novo.</p></div>
 <div class="tmpl"><button class="copy">Copiar</button><div class="tlabel">Protocolo de diagnóstico — cole no seu caderno de operação</div><div class="body">1) Olhar impressões: baixas? → revisar título, ficha, categoria, reputação.
2) Olhar CTR (cliques/impressões): baixo? → foto de capa, preço de vitrine, título.
3) Olhar conversão (vendas/cliques): baixa? → fotos internas, ficha, preço final, avaliações, frete.
4) Mudar UMA coisa por vez e esperar dados antes do próximo ajuste.
5) Nunca apagar/recriar anúncio que tem histórico.</div></div>
 <div class="checklist"><div class="cl-head"><span class="ic">🩺</span><b>Checklist — rotina de diagnóstico</b><span class="cnt"></span></div>
 <div class="check" data-check="c-m19-1"><span class="box">${CHK}</span><span class="tx">Identifico em qual degrau do funil o anúncio trava</span></div>
 <div class="check" data-check="c-m19-2"><span class="box">${CHK}</span><span class="tx">Corrijo a causa do degrau certo, não o sintoma aparente</span></div>
 <div class="check" data-check="c-m19-3"><span class="box">${CHK}</span><span class="tx">Mudo uma variável por vez e espero os dados reagirem</span></div>
 <div class="check" data-check="c-m19-4"><span class="box">${CHK}</span><span class="tx">Não apago anúncios com histórico — melhoro o existente</span></div>
 </div>
 <div class="done-bar" style="margin-top:28px"><div class="tx">Esse é o método que fecha o ciclo. Volte às ferramentas sempre que for executar.</div><button class="btn primary" onclick="go('sys')">Abrir as ferramentas →</button></div>
 `});

 <h2>O retrato lado a lado</h2>
 <p>Mesmo produto, preço quase igual: um vende centenas, o outro fica parado. A diferença nunca é uma coisa só — é o <strong>empilhamento</strong> dos mesmos oito sinais.</p>
 <div class="fig"><div data-art="campeoes"></div><div class="figcap">Os 8 traços que os campeões compartilham. Note: o "parado" às vezes é até 2 reais mais barato — e mesmo assim perde.</div></div>
 <h2>Os denominadores comuns, um a um</h2>
 <ol>
 <li><strong>Reputação verde escuro / MercadoLíder.</strong> Quase nenhum top seller tem termômetro fraco. Entre dois produtos idênticos, o algoritmo escolhe a melhor reputação — e ainda barateia o clique no Ads. É o pré-requisito invisível.</li>
 <li><strong>Entrega rápida: Full e/ou frete grátis.</strong> "Chega amanhã" é regra entre os líderes. Velocidade deixou de ser diferencial e virou requisito pra existir.</li>
 <li><strong>Ficha técnica 100% preenchida + score de qualidade alto.</strong> Anúncio com todos os atributos entra em mais filtros e ranqueia melhor. O ad-score alto é constante nos campeões.</li>
 <li><strong>Fotos limpas e abundantes.</strong> O padrão: fundo branco na capa, de 5 a 8 fotos, vários ângulos e detalhes, sem marca d'água nem texto poluindo.</li>
 <li><strong>Título estruturado com palavras-chave reais.</strong> Produto + marca + atributo decisivo, usando os 60 caracteres com informação de busca — não com "promoção".</li>
 <li><strong>Kits e variações concentrados.</strong> Os kits são campeões de venda: sobem o ticket e a conversão. Cor e tamanho ficam num único anúncio, concentrando avaliações e força de ranqueamento.</li>
 <li><strong>Muita prova social.</strong> O líder típico tem milhares de avaliações e anos de histórico. Por isso copiar o #1 raramente funciona — melhor atacar um ângulo lateral.</li>
 <li><strong>Vídeo no anúncio.</strong> Engaja mais, aumenta o tempo na página, melhora a conversão e conta pontos pro algoritmo.</li>
 </ol>
 <div class="callout key"><div class="kicker">O traço mais forte de todos: ticket baixo, giro alto</div><p>A maioria esmagadora dos campeões custa <strong>menos de R$ 300</strong>, e muitos giram entre <strong>R$ 19 e R$ 40</strong>. O ML é uma máquina de compra rápida por impulso e utilidade — capas, pulseiras de smartwatch, mouses sem fio, itens de reposição. E há um detalhe revelador: o campeão costuma ser a versão <em>mais conveniente</em>, não a mais barata. Nos fones, os mais vendidos são todos <strong>sem fio</strong>; nos sons automotivos, todos têm <strong>USB</strong>. Modernidade e conveniência vendem mais que centavos a menos.</p></div>
 <h2>As duas brechas de ouro</h2>
 <p>Os dados revelam duas oportunidades que a maioria ignora:</p>
 <ul>
 <li><strong>~80% dos vendedores não têm medalha nenhuma.</strong> Fazer o básico com excelência (os 8 sinais acima) já te coloca à frente da massa.</li>
 <li><strong>Você não precisa ser o #1 da categoria principal.</strong> Estar entre os <strong>top 3–5 de uma subcategoria em crescimento</strong> já é um ótimo resultado — com muito menos concorrência. Nicho dentro de nicho é onde mora a margem.</li>
 </ul>
 <div class="callout warn"><div class="kicker">A armadilha do "copiar o campeão"</div><p>Replicar título e preço do #1 não replica o resultado: ele tem milhares de avaliações e anos de trajetória que você não tem. Copie o <strong>esqueleto</strong> (a estrutura dos 8 sinais), não o produto. E lembre: popularidade não é lucro — sempre cheque a margem por SKU antes de entrar.</p></div>

 <div class="check" data-check="c-m20-6"><span class="box">${CHK}</span><span class="tx">Tenho kit e/ou variações num único anúncio</span></div>
